name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  runner:
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/runner-selector.yml

  publish:
    needs: runner
    runs-on: ${{ needs.runner.outputs.runner-label }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      ARCH_OK: ${{ vars.ARCHITECTURE_REVIEW_APPROVED }}
      SEC_OK: ${{ vars.SECURITY_REVIEW_APPROVED }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: cleanarr-runtime-job
            dockerfile: apps/job/Dockerfile
          - image_name: cleanarr-runtime-webhook
            dockerfile: apps/webhook/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Validate review gates
        shell: bash
        run: |
          set -euo pipefail
          test "${ARCH_OK}" = "true"
          test "${SEC_OK}" = "true"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Validate package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          PY_VERSION="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("pyproject.toml").read_text(encoding="utf-8")
          print(re.search(r'^version = "([^"]+)"$', text, re.M).group(1))
          PY
          )"
          test "v${PY_VERSION}" = "${RELEASE_TAG}"
      - name: Public safety scan
        run: python scripts/check_public_safety.py
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Notify ntfy
        if: always()
        env:
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_TOPIC: gha
          NTFY_TITLE: Release ${{ matrix.image_name }}
          NTFY_PRIORITY: ${{ job.status == 'success' && 'default' || 'high' }}
          NTFY_TAGS: ${{ job.status == 'success' && 'rocket,package' || 'warning,package' }}
          NTFY_MESSAGE: |
            release: ${{ job.status }}
            repo: ${{ github.repository }}
            ref: ${{ github.ref }}
            run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify_ntfy.sh
      - name: Update job summary
        if: always()
        env:
          JOB_TITLE: ${{ job.name || github.job }}
          JOB_STATUS: ${{ job.status }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: bash .github/scripts/write_job_summary.sh
