name: Runner Selector

on:
  workflow_call:
    outputs:
      runner-label:
        description: Runner label for this repository.
        value: ${{ jobs.select-runner.outputs.runner-label }}

permissions:
  actions: read
  contents: read

jobs:
  select-runner:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.set-runner.outputs.runner-label }}
    steps:
      - id: set-runner
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          USE_SELF_HOSTED: ${{ vars.USE_SELF_HOSTED }}
        run: |
          set -euo pipefail

          if [ "${USE_SELF_HOSTED}" != "true" ]; then
            echo "runner-label=ubuntu-latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! runners_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners")"; then
            echo "runner-label=ubuntu-latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! online_runner_count="$(printf '%s' "${runners_json}" | jq '[.runners[] | select(.status == "online")] | length')"; then
            echo "runner-label=ubuntu-latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${online_runner_count}" -gt 0 ]; then
            echo "runner-label=home-gh-runner" >> "$GITHUB_OUTPUT"
          else
            echo "runner-label=ubuntu-latest" >> "$GITHUB_OUTPUT"
          fi
